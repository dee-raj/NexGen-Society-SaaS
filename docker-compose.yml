version: '3.8'

services:
  api:
    build:
      context: .
      target: development
    container_name: nexgen-api
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/nexgen_society_saas
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./src:/app/src          # Hot-reload in dev
      - /app/node_modules       # Don't overwrite container modules
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: nexgen-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexgen-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

volumes:
  mongo_data:
