version: '3.8'

services:
  api:
    build:
      context: .
      target: production
    container_name: nexgen-api-prod
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/nexgen_society_saas
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.25-alpine
    container_name: nexgen-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL certificates would go here:
      # - ./certbot/conf:/etc/letsencrypt
      # - ./certbot/www:/var/www/certbot
    depends_on:
      - api
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  mongo:
    image: mongo:7
    container_name: nexgen-mongo-prod
    volumes:
      - mongo_data_prod:/data/db
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: nexgen-redis-prod
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

volumes:
  mongo_data_prod:
  redis_data_prod:
